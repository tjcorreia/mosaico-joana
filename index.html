<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaico - 50 Anos Joana</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: Arial, Helvetica, sans-serif; overflow: hidden; }
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 12px 20px;
    text-align: center;
    font-size: 18px;
    letter-spacing: 0.5px;
  }
  #viewer {
    width: 100%;
    height: 100vh;
  }
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    color: #ccc;
    padding: 8px;
    text-align: center;
    font-size: 13px;
  }
</style>
</head>
<body>
  <header>Mosaico - 50 Anos Joana</header>
  <div id="viewer"></div>
  <footer>Usa a roda do rato ou pinça para fazer zoom &middot; arrasta para mover</footer>

  <script>
    OpenSeadragon({
      id: "viewer",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
      tileSources: {
        type: "image",
        url: "mosaico.jpg"
      },
      showNavigator: true,
      navigatorPosition: "BOTTOM_RIGHT",
      minZoomImageRatio: 0.8,
      maxZoomPixelRatio: 4,
      visibilityRatio: 1,
      gestureSettingsMouse: {
        clickToZoom: false
      }
    });
  </script>
</body>
</html>
